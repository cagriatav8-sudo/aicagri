<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinity AI | Çağrı ATAV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff0055; --bg: #010101; --glass: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', system-ui, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; background: var(--bg); color: #fff; overflow-x: hidden; overflow-y: auto; scroll-behavior: smooth; }

        .inf-brand {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.04); padding: 6px 20px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08); font-size: 11px; letter-spacing: 3px; color: #555; z-index: 1001; text-transform: uppercase;
        }

        #nebula { position: fixed; top: 0; left: 0; z-index: -1; background: #000; }

        #boot { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; transition: 0.8s; }
        .boot-ring { width: 55px; height: 55px; border: 2px solid #111; border-top: 2px solid var(--main); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ai-wrap { margin: 80px 40px 100px 40px; background: rgba(8, 8, 8, 0.98); border: 1px solid #1a1a1a; border-radius: 30px; height: 650px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.8); }
        #chat-flow { flex-grow: 1; padding: 35px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .bubble { padding: 18px 25px; border-radius: 20px; max-width: 88%; line-height: 1.7; font-size: 15px; }
        .ai-bub { background: rgba(255, 0, 85, 0.04); color: #ffcccc; align-self: flex-start; border-left: 4px solid var(--main); }
        .user-bub { background: #161616; align-self: flex-end; border-right: 4px solid #fff; }

        .input-zone { padding: 25px 35px; background: #050505; display: flex; gap: 15px; border-top: 1px solid #111; align-items: center; }
        #userInput { flex-grow: 1; background: #000; border: 1px solid #222; color: #fff; padding: 16px 25px; border-radius: 30px; outline: none; font-size: 16px; }
        .s-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--main); color: #fff; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .s-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--main); }
    </style>
</head>
<body>

    <div class="inf-brand">with Infinity™</div>
    <div id="boot"><div class="boot-ring"></div></div>
    <canvas id="nebula"></canvas>

    <div class="ai-wrap">
        <div id="chat-flow">
            <div class="bubble ai-bub"><strong>[ÇA İN2.10.8]</strong> Evrensel Veri Hattı Aktif. <br>Haber, Astronomi, Matematik ve Coğrafya sorgularına hazırım Çağrı İmparator.</div>
        </div>
        <div class="input-zone">
            <input type="text" id="userInput" placeholder="Dünyayı veya Uzayı sor..." autofocus autocomplete="off">
            <button class="s-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // --- BOOT ---
        window.onload = () => { setTimeout(() => { document.getElementById('boot').style.opacity='0'; setTimeout(()=>document.getElementById('boot').style.display='none',800); }, 1000); };

        // --- UZAY MOTORU ---
        const canvas = document.getElementById('nebula');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let w, h;
        function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; stars = []; for(let i=0; i<450; i++) stars.push({x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, s:Math.random()*0.4}); }
        function render() { ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h); ctx.fillStyle='#fff'; stars.forEach(s => { let px = (s.x-w/2)*(w/s.z)+w/2; let py = (s.y-h/2)*(w/s.z)+h/2; let r = (w/s.z)*0.8; if(px>0 && px<w && py>0 && py<h) { ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill(); } s.z -= s.s; if(s.z<=0) s.z=w; }); requestAnimationFrame(render); }
        init(); render();

        // --- GLOBAL AI ÇEKİRDEĞİ ---
        function sendMsg() {
            const input = document.getElementById('userInput');
            const val = input.value.trim(); if(!val) return;
            
            const u = document.createElement('div'); u.className = 'bubble user-bub'; u.innerText = val;
            document.getElementById('chat-flow').appendChild(u);
            input.value = '';

            setTimeout(() => {
                let out = "";
                const low = val.toLowerCase();

                // 1. MATEMATİKSEL AYIKLAMA (Regex)
                const mathMatch = val.match(/(\d+[\+\-\*\/\^]\d+)/);
                
                // 2. ANALİZ VE CEVAP MANTIĞI
                if (mathMatch) {
                    try {
                        const result = math.evaluate(mathMatch[0]);
                        out = `İşlem Algılandı: ${mathMatch[0]}\nSonuç: ${result}\n\nÇağrı, matematiksel analiz çekirdeğim bu veriyi anında işledi.`;
                    } catch(e) { out = "Güncellenme yapılmadığı için 'ÇA İN2.10.8' bu karmaşık matematiksel düğümü çözemiyor."; }
                } 
                else if (low.includes("dünya") && low.includes("ay") && low.includes("km")) {
                    out = "Astronomi Verisi: Dünya ile Ay arasındaki ortalama mesafe yaklaşık 384.400 km'dir. Yörüngeye göre bu mesafe değişse de temel çekirdek verim budur.";
                }
                else if (low.includes("ayın evresi") || low.includes("ay durumu")) {
                    const city = low.includes("silivri") ? "Silivri" : (low.includes("ankara") ? "Ankara" : "Bulunduğun Konum");
                    out = `Gözlemsel Veri: Şu an ${city} semalarında Ay, 'İlk Dördün' evresine yaklaşmaktadır. Gökyüzü verilerim bu koordinatta netlik sağlıyor.`;
                }
                else if (low.includes("hava") || low.includes("derece")) {
                    out = `Meteorolojik Analiz: Belirttiğin bölgede hava şu an ortalama 16-19°C civarında seyrediyor. Detaylı nem analizi için 'nem' komutu verebilirsin.`;
                }
                else if (low.includes("gazete") || low.includes("ne oldu") || low.includes("haber")) {
                    out = "Gündem Analizi: Bugün global çapta teknolojik gelişmeler ve ekonomi başlıkları ön planda. Yerel haber akışında ise sosyal ve kültürel etkinlikler dikkat çekiyor.";
                }
                else if (low.includes("hangi site") || low.includes("nereden")) {
                    out = "Benim veritabanım özgün Infinity çekirdeklerinden beslenir. Bilgileri herhangi bir web sitesinden kopyalamıyor, 'ÇA İN2.10.8' algoritmalarıyla sentezliyorum.";
                }
                else {
                    // GENEL SORULARI ANLAMA ÇABASI
                    if (val.length > 5) {
                        out = `"${val}" sorgusu üzerine bir analiz yaptım Çağrı. Ancak Güncellenme yapılmadığı için 'ÇA İN2.10.8' henüz bu konudaki tüm detaylara hakim değil.`;
                    } else {
                        out = "Güncellenme yapılmadığı için 'ÇA İN2.10.8' henüz bu soruya cevap veremiyor.";
                    }
                }

                const a = document.createElement('div'); a.className = 'bubble ai-bub'; a.innerText = out;
                document.getElementById('chat-flow').appendChild(a);
                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
            }, 500);
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
