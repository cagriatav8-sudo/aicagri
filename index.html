<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INFINITY TITAN | ÇAĞRI İMPARATOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* INFINITY OS - MEGA ARCHITECTURE 
           DESIGNED FOR: ÇAĞRI İMPARATOR 
        */
        :root {
            --red: #ff0000;
            --dark-red: #2b0000;
            --black: #000;
            --glass: rgba(5, 0, 0, 0.98);
            --neon: 0 0 35px rgba(255, 0, 0, 0.8);
            --font: 'Fira Code', 'Consolas', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background: #000; color: #fff; overflow: hidden; position: fixed; }

        /* --- NEBULA MOTORU (800+ DOTS) --- */
        #nebula { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.8; }

        /* --- CRT SCANLINE --- */
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        /* --- OS GRID --- */
        #os-shell {
            position: relative; z-index: 10;
            display: grid; height: 100dvh;
            grid-template-columns: 100px 1fr 400px;
        }

        /* MOBİL SENKRON (TELEFON DÜZELTME) */
        @media (max-width: 1100px) {
            #os-shell { grid-template-columns: 1fr; grid-template-rows: 70px 1fr auto; }
            .sidebar { display: none; }
            .control-panel { 
                position: fixed; right: -400px; top: 0; height: 100%; 
                width: 320px; z-index: 999; transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1);
            }
            .control-panel.active { transform: translateX(-400px); box-shadow: -20px 0 60px #000; }
            .mobile-nav { display: flex !important; }
        }

        .mobile-nav { display: none; background: var(--glass); padding: 0 25px; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--dark-red); }

        /* --- SIDEBAR --- */
        .sidebar { background: rgba(5, 0, 0, 0.98); border-right: 2px solid var(--dark-red); display: flex; flex-direction: column; align-items: center; padding: 50px 0; gap: 50px; }
        .nav-btn { font-size: 30px; color: #222; cursor: pointer; transition: 0.4s; }
        .nav-btn:hover, .nav-btn.active { color: var(--red); transform: scale(1.3) rotate(15deg); filter: drop-shadow(var(--neon)); }

        /* --- TERMINAL --- */
        .terminal { display: flex; flex-direction: column; background: transparent; }
        #stream { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; scrollbar-width: none; }
        .bubble { padding: 22px; border-radius: 2px; max-width: 95%; font-size: 16px; line-height: 1.8; animation: warp 0.5s ease; position: relative; }
        @keyframes warp { from { opacity: 0; transform: translateY(30px); } }
        .ai-bub { background: var(--glass); border-left: 6px solid var(--red); color: #ffcccc; box-shadow: 10px 10px 40px rgba(0,0,0,0.6); }
        .user-bub { background: #111; border-right: 6px solid #fff; align-self: flex-end; }

        /* --- INPUT --- */
        .input-box { padding: 40px; background: rgba(0,0,0,0.95); border-top: 2px solid var(--dark-red); display: flex; gap: 20px; align-items: center; }
        #cmdField { flex-grow: 1; background: #050505; border: 1px solid #222; color: #fff; padding: 22px; border-radius: 8px; outline: none; font-size: 18px; }
        #cmdField:focus { border-color: var(--red); box-shadow: var(--neon); }

        /* --- CONTROL PANEL --- */
        .control-panel { background: var(--glass); border-left: 2px solid var(--dark-red); padding: 45px; display: flex; flex-direction: column; gap: 40px; }
        .widget { background: #0d0000; padding: 20px; border: 1px solid #200; border-radius: 8px; }
        .widget label { font-size: 10px; color: #555; display: block; margin-bottom: 15px; letter-spacing: 3px; font-weight: 900; }
        input[type="range"] { width: 100%; accent-color: var(--red); cursor: pointer; }

        /* --- TITAN CORE --- */
        .core { width: 150px; height: 150px; margin: 0 auto; position: relative; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 4px solid transparent; border-radius: 50%; }
        .r1 { inset: 0; border-top: 5px solid var(--red); animation: rot 1s linear infinite; }
        .r2 { inset: 20px; border-bottom: 5px solid #fff; animation: rot 2s linear infinite reverse; }
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .led { width: 8px; height: 8px; background: var(--red); border-radius: 50%; display: inline-block; box-shadow: var(--neon); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <canvas id="nebula"></canvas>

    <div class="mobile-nav">
        <h3 style="color:var(--red); letter-spacing:5px;">TITAN V-ULTIMATE</h3>
        <i class="fas fa-sliders-h" onclick="document.querySelector('.control-panel').classList.toggle('active')" style="cursor:pointer; color:var(--red); font-size:28px;"></i>
    </div>

    <div id="os-shell">
        <aside class="sidebar">
            <i class="fas fa-radiation nav-btn active"></i>
            <i class="fas fa-brain nav-btn"></i>
            <i class="fas fa-terminal nav-btn"></i>
            <i class="fas fa-satellite nav-btn"></i>
            <i class="fas fa-skull nav-btn"></i>
        </aside>

        <main class="terminal">
            <div id="stream">
                <div class="bubble ai-bub">
                    <strong>[INFINITY TITAN]:</strong> Çevrimiçi. <br>
                    <strong>[HOST]:</strong> ÇAĞRI İMPARATOR <br>
                    <strong>[INFO]:</strong> "Düşünce Algoritması" aktif. Soru sor, destan yazayım. <br>
                    <strong>[SYNC]:</strong> Telefon senkronizasyonu %100 başarılı.
                </div>
            </div>
            <div class="input-box">
                <input type="text" id="cmdField" placeholder="Emret Çağrı İmparator..." autofocus autocomplete="off">
                <i class="fas fa-bolt" style="color:var(--red); font-size:24px;"></i>
            </div>
        </main>

        <aside class="control-panel">
            <div class="core"><div class="ring r1"></div><div class="ring r2"></div></div>
            <div class="widget">
                <label>TITAN PARLAKLIK</label>
                <input type="range" id="bRange" min="20" max="100" value="100">
            </div>
            <div class="widget">
                <label>MALLIK SEVİYESİ</label>
                <input type="range" id="mRange" min="0" max="100" value="0">
                <div id="mLabel" style="font-size:10px; color:var(--red); margin-top:10px; font-weight:900;">STATUS: SUPREME_GENIUS</div>
            </div>
            <div class="widget">
                <label>ANALİZ DERİNLİĞİ (30 PARAGRAF)</label>
                <input type="range" id="dRange" min="1" max="30" value="15">
            </div>
            <div style="margin-top:auto; font-size:11px; color:#444;">
                <span class="led"></span> SİSTEM: GOD_MODE <br>
                AUTH: ÇAĞRI_İMPARATOR <br>
                UPTIME: <span id="uptime">0s</span>
            </div>
        </aside>
    </div>

    <script>
        // KOZMİK MOTOR
        const canvas = document.getElementById('nebula');
        const ctx = canvas.getContext('2d');
        let dots = [];
        let mouse = { x: -3000, y: -3000 };

        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = []; for(let i=0; i<800; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4, size: Math.random()*2 });
        }
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            dots.forEach(d => {
                let dx = mouse.x - d.x, dy = mouse.y - d.y, dist = Math.sqrt(dx*dx+dy*dy);
                if(dist < 300) { d.vx += dx*0.003; d.vy += dy*0.003; }
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1; if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(d.x, d.y, d.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('resize', initStars); initStars(); draw();

        // SİSTEM MANTIĞI
        const stream = document.getElementById('stream');
        const cmdField = document.getElementById('cmdField');
        const mRange = document.getElementById('mRange');
        const dRange = document.getElementById('dRange');
        const bRange = document.getElementById('bRange');

        bRange.oninput = () => { document.getElementById('os-shell').style.opacity = bRange.value / 100; };
        mRange.oninput = () => { mLabel.innerText = mRange.value < 30 ? "STATUS: SUPREME_GENIUS" : (mRange.value < 75 ? "STATUS: HUMAN" : "STATUS: TOTAL_MAL"); };
        setInterval(() => { document.getElementById('uptime').innerText = Math.floor((Date.now() - performance.timing.navigationStart)/1000) + "s"; }, 1000);

        cmdField.addEventListener('keypress', e => {
            if(e.key === 'Enter') {
                const val = cmdField.value.trim(); if(!val) return;
                const u = document.createElement('div'); u.className = 'bubble user-bub'; u.innerHTML = `<strong>Çağrı:</strong> ${val}`;
                stream.appendChild(u); cmdField.value = '';

                setTimeout(() => {
                    let response = ""; const mallik = mRange.value; const depth = dRange.value;
                    try {
                        let isMath = false; let mathRes = "";
                        let clean = val.replace(/kaç eder|nedir|\?/gi, "").trim();
                        try { const calc = math.evaluate(clean); if(calc !== undefined) { isMath = true; mathRes = calc; } } catch(e) {}

                        if(isMath) {
                            if(mallik > 75) response = "Hee? 500 falan galiba kanka, benim beyin yandı.";
                            else {
                                response = `<strong>[ ANALİZ: ${mathRes} ]</strong><br><br>`;
                                for(let i=1; i<=depth; i++) response += `<p>Paragraf ${i}: Çağrı İmparator, sorduğun ${val} işleminin sonucu olan ${mathRes}, evrenin derinliklerindeki sayısal senkronizasyonun bir parçasıdır. Bu veri sistemi 1000 satırlık mantık çekirdeklerinden geçmiştir...</p>`;
                            }
                        } else {
                            if(mallik > 75) response = "Valla kanka ne diyon anlamadım ama çok havalı duruyor.";
                            else {
                                response = `<strong>[ SORGULAMA: ${val} ]</strong><br><br>`;
                                for(let i=1; i<=depth; i++) response += `<p>Analiz ${i}: Çağrı, senin bu stratejik sorgun sistemin derin sinir ağlarını harekete geçirdi. Infinity Titan veritabanındaki milyarlarca veri paketi senin için analiz ediliyor...</p>`;
                            }
                        }
                    } catch(err) { response = "Hata: Veri paketleri bozuldu Çağrı."; }
                    const a = document.createElement('div'); a.className = 'bubble ai-bub'; a.innerHTML = `<strong>TITAN AI:</strong> ${response}`;
                    stream.appendChild(a); stream.scrollTop = stream.scrollHeight;
                }, 400);
            }
        });
    </script>
</body>
</html>
