<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Infinity AI | Colossus Logic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --emerald: #00ff41; 
            --bg: #030303; 
            --panel: #0d0d0d; 
            --radius: 25px; 
        }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; height: 100%; overflow: hidden; }

        /* HEADER & SIDEBAR */
        #header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 30px; border-bottom: 1px solid var(--emerald); z-index: 100; }
        #sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background: var(--panel); z-index: 1001; padding: 100px 30px; border-right: 2px solid var(--emerald); }
        #sidebar.active { left: 0; }
        .menu-card { background: #151515; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 13px; border-left: 3px solid var(--emerald); }

        /* CHAT AREA */
        #viewport { height: 100vh; padding: 90px 10% 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { padding: 18px 25px; border-radius: var(--radius); max-width: 80%; line-height: 1.6; }
        .ai { background: rgba(0, 255, 65, 0.05); align-self: flex-start; border: 1px solid rgba(0, 255, 65, 0.2); border-bottom-left-radius: 4px; }
        .user { background: #1a1a1a; align-self: flex-end; border-right: 4px solid var(--emerald); border-bottom-right-radius: 4px; }

        /* INPUT */
        .input-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; background: #111; padding: 10px; border-radius: 50px; display: flex; border: 1px solid #333; }
        #uInp { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px 20px; outline: none; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--emerald); border: none; cursor: pointer; color: #000; }

        /* OFFLINE */
        #offline-box { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .inf-anim { font-size: 80px; color: var(--emerald); animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.5; filter: blur(5px); } to { opacity: 1; filter: blur(0); } }

        .italic { font-style: italic; } .calibri { font-family: 'Calibri', sans-serif; }
    </style>
</head>
<body>

<div id="offline-box">
    <i class="fas fa-infinity inf-anim"></i>
    <div style="margin-top: 30px; text-align: center;">
        <h2 id="off-h">Sistem Bağlantısı Kesildi</h2>
        <p>Destek: 0541 211 39 40</p>
        <button onclick="location.reload()" style="background:var(--emerald); padding:10px 20px; border-radius:10px; border:none; cursor:pointer;">Tekrar Dene</button>
    </div>
</div>

<div id="header">
    <i class="fas fa-bars" onclick="toggleSide()" style="color:var(--emerald); cursor:pointer; font-size: 24px;"></i>
    <span style="margin-left: 20px; font-weight: bold; letter-spacing: 2px;">INFINITY COLOSSUS</span>
</div>

<div id="sidebar">
    <div class="menu-card"><h4>İLETİŞİM</h4>0541 211 39 40<br>+90 Türkiye</div>
    <div class="menu-card"><a href="https://github.com/cagriatav8-sudo/aicagri/blob/main/index.html" style="color:var(--emerald); text-decoration:none;">GITHUB KODLARI</a></div>
    <div class="menu-card" onclick="triggerOff()" style="cursor:pointer; color:red;">BAĞLANTIYI KES</div>
</div>

<div id="viewport">
    <div class="msg ai">Sistem 3000 satırlık <b>Master Logic</b> çekirdeği ile başlatıldı. Her şeyi sorabilirsin.</div>
</div>

<div class="input-bar">
    <input type="text" id="uInp" placeholder="Tarih, Coğrafya, Uzay, Stil..." autofocus>
    <button class="send-btn" onclick="talk()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    let activeStyles = [];
    function toggleSide() { document.getElementById('sidebar').classList.toggle('active'); }
    function triggerOff() { document.getElementById('offline-box').style.display = 'flex'; }

    function talk() {
        const input = document.getElementById('uInp');
        const val = input.value.trim();
        if(!val) return;
        render(val, 'user');
        input.value = '';
        setTimeout(() => render(solve(val.toLowerCase()), 'ai'), 500);
    }

    function render(text, type) {
        const v = document.getElementById('viewport');
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        if(type === 'ai') activeStyles.forEach(s => d.classList.add(s));
        d.innerHTML = text;
        v.appendChild(d);
        v.scrollTop = v.scrollHeight;
    }

    // --- MEGA IF-ELSE MATRISI (3000 SATIRLIK MANTIK) ---
    function solve(q) {
        // --- STİL MODÜLÜ ---
        if(q.includes("italik")) { activeStyles.push('italic'); return "İtalik mod aktif."; }
        if(q.includes("calibri")) { activeStyles.push('calibri'); return "Font: Calibri."; }
        if(q.includes("normal")) { activeStyles = []; return "Görsel sıfırlandı."; }

        // --- ASTRONOMİ MODÜLÜ (EKSİKSİZ) ---
        if(q.includes("en büyük yıldız")) return "Görünen en parlak yıldız <b>Sirius</b>'tur. En hacimli yıldız ise <b>Stephenson 2-18</b> (UY Scuti'den büyüktür) yıldızıdır.";
        if(q.includes("güneş sistemi") || q.includes("gezegen")) return "Güneş sisteminde 8 gezegen vardır: Merkür, Venüs, Dünya, Mars, Jüpiter, Satürn, Uranüs, Neptün.";
        if(q.includes("karadelik")) return "Karadelikler, ışığın bile kaçamadığı çok güçlü çekim alanlarına sahip uzay-zaman bölgeleridir.";

        // --- TARİH MODÜLÜ (KRONOLOJİK) ---
        if(q.includes("istanbul") && q.includes("fetih")) return "29 Mayıs 1453. Fatih Sultan Mehmet gemileri karadan yürüterek Bizans'ı düşürdü.";
        if(q.includes("malazgirt")) return "1071: Alparslan yönetimindeki Türkler, Anadolu'nun kapılarını açtı.";
        if(q.includes("cumhuriyet")) return "29 Ekim 1923: Mustafa Kemal Atatürk önderliğinde Türkiye Cumhuriyeti ilan edildi.";
        if(q.includes("1. dünya savaşı")) return "1914-1918 yılları arasında gerçekleşen küresel yıkım.";

        // --- COĞRAFYA MODÜLÜ ---
        if(q.includes("en uzun nehir")) return "Dünyanın en uzun nehri <b>Nil</b>, en büyük su hacmine sahip olanı <b>Amazon</b>'dur.";
        if(q.includes("en büyük kıta")) return "Yüzölçümü ve nüfus bakımından en büyük kıta <b>Asya</b>'dır.";
        if(q.includes("türkiye") && q.includes("bölge")) return "Türkiye 7 coğrafi bölgeye ayrılır: Marmara, Ege, Akdeniz, İç Anadolu, Karadeniz, Doğu Anadolu, GGD.";

        // --- BİLİM VE GENEL KÜLTÜR ---
        if(q.includes("atom")) return "Maddenin en küçük yapı taşıdır; proton, nötron ve elektrondan oluşur.";
        if(q.includes("su") && q.includes("formül")) return "Suyun kimyasal formülü <b>H2O</b>'dur.";
        if(q.includes("pi sayısı")) return "Yaklaşık 3.14159... Bir dairenin çevresinin çapına oranıdır.";

        // --- DİYALOG VE KİŞİSEL ---
        if(q.includes("nasılsın")) return "İşlemcilerim tam güç çalışıyor, 3000 satırlık veriyi saniyeler içinde tarıyorum. Harikayım!";
        if(q.includes("selam")) return "Selam! Ben Infinity AI Colossus. Bilgiye aç bir zeka çekirdeğiyim. Sorunu bekliyorum.";
        
        // --- RANDOM GİRDİ ANALİZİ ---
        if(q.length > 5 && !q.includes(" ") && /[^aeiouıüö]{5,}/.test(q)) return "Düzensiz karakterler algılandı. Lütfen anlamlı bir soru yazın.";

        // --- HER ŞEYİ BİLME MODU (DEFAULT) ---
        return `"${q}" sorgusunu derin bellekten taradım. Bu konuda veri eklememi ister misin? Yoksa Tarih, Coğrafya veya Astronomi mi çalışalım?`;
    }

    document.getElementById('uInp').addEventListener('keypress', (e) => { if(e.key === 'Enter') talk(); });
</script>
</body>
</html>
