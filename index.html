<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-AI Platform</title>
    <style>
        /* Modern ve Karanlık Tema Ayarları */
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* O Meşhur Dönen Daireler */
        .ai-core {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }

        .circle {
            position: absolute;
            border: 4px solid transparent;
            border-radius: 50%;
            animation: rotate linear infinite;
        }

        .outer {
            width: 100%;
            height: 100%;
            border-top-color: #ff0000; /* Kırmızı */
            border-bottom-color: #330000;
            animation-duration: 2s;
        }

        .inner {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-left-color: #660000;
            border-right-color: #000000; /* Siyah */
            animation-duration: 1.5s;
            animation-direction: reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Sohbet Penceresi */
        #chat-container {
            width: 90%;
            max-width: 500px;
            height: 400px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            padding-right: 5px;
        }

        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .bot { background: #330000; align-self: flex-start; color: #ff9999; }
        .user { background: #333; align-self: flex-end; margin-left: auto; }

        /* Giriş Alanı */
        .input-area { display: flex; gap: 10px; }
        input {
            flex-grow: 1;
            background: #000;
            border: 1px solid #ff0000;
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }
        button {
            background: #ff0000;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="ai-core">
        <div class="circle outer"></div>
        <div class="circle inner"></div>
    </div>

    <h2>MS-AI Zekası</h2>

    <div id="chat-container">
        <div id="messages">
            <div class="msg bot">Selam Musab! Ben senin özel yapay zekanım. Bugün ne kodlayalım?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Bir şeyler yaz ms..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('userInput');

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // Kullanıcı mesajını ekle
            addMessage(text, 'user');
            inputField.value = '';

            // Botun "düşünmesi" için kısa bir bekleme
            setTimeout(() => {
                const response = getAIResponse(text);
                addMessage(response, 'bot');
            }, 600);
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Temel Yapay Zeka Mantığı (Burayı binlerce satır yapabilirsin!)
        function getAIResponse(input) {
            const cmd = input.toLowerCase();
            
            if (cmd.includes("selam") || cmd.includes("merhaba")) return "Selam dostum! Çalışmaya hazır mısın?";
            if (cmd.includes("arduino")) return "Arduino projelerin için devre şemalarını kontrol etmemi ister misin?";
            if (cmd.includes("nasılsın")) return "Bir yapay zeka olarak her zaman 100% işlemci gücüyle harikayım! Sen nasılsın?";
            if (cmd.includes("minecraft")) return "Fabric modların hazır mı? Litematica ile ne inşa ediyoruz?";
            
            return "Bunu not aldım. Üzerinde düşüneceğim, geliştirmeye devam ediyorum!";
        }
    </script>
</body>
</html>
