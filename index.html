<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HUDAYR V6 | ÇAĞRI İMPARATOR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --red: #ff0000;
            --dark: #0a0000;
            --glow: rgba(255, 0, 0, 0.4);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* DİNAMİK ARKA PLAN */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.2;
        }

        /* ÇAĞRI'NIN DÖNEN ÇEKİRDEĞİ (HUDAYR CORE) */
        .core-box {
            position: relative;
            z-index: 10;
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
        }

        .halka {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        .dis-halka {
            width: 100%; height: 100%;
            border-top: 4px solid var(--red);
            border-bottom: 4px solid #330000;
            animation: spin 2s linear infinite;
        }

        .ic-halka {
            width: 70%; height: 70%;
            top: 15%; left: 15%;
            border-left: 4px solid #fff;
            border-right: 4px solid var(--red);
            animation: spin 1s linear infinite reverse;
        }

        .merkez {
            width: 20px; height: 20px;
            background: var(--red);
            border-radius: 50%;
            position: absolute;
            top: 45%; left: 45%;
            box-shadow: 0 0 30px var(--red);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* ANA TERMİNAL PENCERESİ */
        .terminal {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 950px;
            height: 550px;
            background: rgba(10, 0, 0, 0.9);
            border: 1px solid var(--red);
            box-shadow: 0 0 40px var(--glow);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--red);
            color: #000;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        #screen {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .line { margin-bottom: 10px; line-height: 1.4; }
        .ai { color: var(--red); }
        .user { color: #00ff00; } /* Çağrı'nın yazı rengi yeşil (Hacker yeşili) */

        .input-area {
            background: #050000;
            padding: 15px;
            display: flex;
            border-top: 1px solid #300;
        }

        .input-area span { color: var(--red); margin-right: 10px; }
        
        input {
            background: transparent;
            border: none;
            color: #fff;
            flex-grow: 1;
            outline: none;
            font-family: inherit;
            font-size: 16px;
        }

        /* SCANLINE EFEKTİ */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.1);
            position: absolute;
            top: 0;
            z-index: 11;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="core-box">
        <div class="halka dis-halka"></div>
        <div class="halka ic-halka"></div>
        <div class="merkez"></div>
    </div>

    <div class="terminal">
        <div class="scanline"></div>
        <div class="header">
            <span>HUDAYR OS v6.0 - KERNEL: 0x889</span>
            <span>USER: ÇAĞRI İMPARATOR</span>
        </div>
        <div id="screen">
            <div class="line ai">> Sistem başlatıldı...</div>
            <div class="line ai">> Tüm matematiksel algoritmalar senkronize edildi.</div>
            <div class="line ai">> Merhaba Çağrı İmparator, seni bekliyordum.</div>
        </div>
        <div class="input-area">
            <span>root@cagri:~#</span>
            <input type="text" id="cmd" autofocus spellcheck="false" autocomplete="off">
        </div>
    </div>

    <script>
        // Arka Plan Efekti
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawDots() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "#200";
            for(let i=0; i<100; i++) {
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
        }
        setInterval(drawDots, 100);

        // Terminal Mantığı
        const screen = document.getElementById('screen');
        const input = document.getElementById('cmd');

        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = input.value.trim();
                if(val) {
                    printMsg(`root@cagri: ${val}`, 'user');
                    processAI(val);
                }
                input.value = '';
            }
        });

        function printMsg(text, type) {
            const div = document.createElement('div');
            div.className = `line ${type}`;
            div.innerHTML = text;
            screen.appendChild(div);
            screen.scrollTop = screen.scrollHeight;
        }

        function processAI(msg) {
            setTimeout(() => {
                let out = "";
                try {
                    // Matematik Kontrolü
                    const res = math.evaluate(msg);
                    if(typeof res !== 'undefined') {
                        out = `[HESAPLAMA]: ${res}`;
                    }
                } catch(err) {
                    // Sohbet Kontrolü
                    const low = msg.toLowerCase();
                    if(low.includes("selam")) out = "Selam Çağrı İmparator! Yetkiler en üst seviyeye çıkarıldı.";
                    else if(low.includes("saat")) out = "Sistem Zamanı: " + new Date().toLocaleTimeString();
                    else if(low.includes("temizle")) { screen.innerHTML = ""; out = "Bellek temizlendi."; }
                    else out = "Komut işlendi. Veri paketleri merkeze gönderiliyor...";
                }
                printMsg(`> ${out}`, 'ai');
            }, 300);
        }
    </script>
</body>
</html>
