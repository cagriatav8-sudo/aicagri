<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinity AI | Çağrı ATAV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #ff0055; --bg: #020202; --panel: rgba(12, 12, 12, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        /* MOBİL CİHAZLAR İÇİN TAM EKRAN STABİLİZASYONU */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh;
            background: var(--bg); color: #fff; overflow-x: hidden; 
            overflow-y: auto; scroll-behavior: smooth;
        }

        /* --- with Infinity™ İmzası --- */
        .inf-brand {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.04); padding: 6px 22px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08); font-size: 11px; letter-spacing: 3px; 
            color: #555; z-index: 1001; text-transform: uppercase; pointer-events: none;
        }

        /* UZAY MOTORU (Tıklamayı engellemez) */
        #nebula { position: fixed; top: 0; left: 0; z-index: 1; background: #000; pointer-events: none; }

        /* --- Boot Loader --- */
        #boot { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; transition: 0.8s; }
        .boot-ring { width: 55px; height: 55px; border: 2px solid #111; border-top: 2px solid var(--main); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Ayarlar (Sol Alt) --- */
        .set-trigger {
            position: fixed; bottom: 30px; left: 30px; width: 55px; height: 55px;
            background: var(--panel); border: 1px solid var(--main); border-radius: 20px;
            display: flex; justify-content: center; align-items: center; color: var(--main); 
            font-size: 22px; cursor: pointer; z-index: 1005; transition: 0.3s;
        }
        #side-panel {
            position: fixed; top: 0; left: -100%; width: 320px; height: 100%; background: var(--panel);
            border-right: 1px solid #222; z-index: 1006; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); 
            padding: 80px 40px; display: flex; flex-direction: column; gap: 35px;
        }
        #side-panel.open { left: 0; }

        /* --- Sayfa Yapısı --- */
        .content-wrapper { position: relative; z-index: 10; padding-top: 80px; width: 100%; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 0 30px 20px 30px; }
        .card { background: rgba(15, 15, 15, 0.85); border: 1px solid #1a1a1a; border-radius: 40px; padding: 30px; text-align: center; backdrop-filter: blur(10px); }
        .card h2 { font-size: 1.1rem; color: var(--main); margin-bottom: 8px; }
        .card p { color: #888; font-size: 0.9rem; margin: 0; }

        /* --- AI Chat Alanı --- */
        .ai-section { 
            margin: 20px 30px 120px 30px; background: rgba(8, 8, 8, 0.98); 
            border: 1px solid #1a1a1a; border-radius: 40px; height: 500px; 
            display: flex; flex-direction: column; overflow: hidden; 
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }
        #chat-flow { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        #chat-flow::-webkit-scrollbar { display: none; }
        .bubble { padding: 18px 22px; border-radius: 25px; max-width: 85%; line-height: 1.6; font-size: 15px; }
        .ai-bub { background: rgba(255, 0, 85, 0.05); color: #ffcccc; align-self: flex-start; border-left: 5px solid var(--main); }
        .user-bub { background: #1a1a1a; align-self: flex-end; border-right: 5px solid #fff; }

        /* --- Giriş Ünitesi (Kilitlenme ve Odaklanma Çözümü) --- */
        .input-zone { 
            padding: 20px 30px; background: #050505; 
            display: flex; gap: 12px; border-top: 1px solid #111; 
            align-items: center; position: relative; z-index: 1010;
        }
        #userInput { 
            flex-grow: 1; background: #000; border: 1px solid #222; 
            color: #fff; padding: 15px 22px; border-radius: 30px; 
            outline: none; font-size: 16px; cursor: text;
            -webkit-user-select: text; user-select: text;
        }
        #userInput:focus { border-color: var(--main); }
        .send-btn { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: var(--main); color: #fff; border: none; 
            cursor: pointer; font-size: 18px; display: flex; 
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="inf-brand">with Infinity™</div>
    <div id="boot"><div class="boot-ring"></div></div>
    <canvas id="nebula"></canvas>

    <div class="set-trigger" onclick="toggleSet()"><i class="fas fa-sliders-h"></i></div>
    <div id="side-panel">
        <h3 style="color:var(--main); letter-spacing:4px;">AYARLAR</h3>
        <p style="font-size:10px; color:#555;">VERSİYON: ÇA İN2.10.8</p>
        <div style="display:flex; flex-direction:column; gap:30px;">
            <div class="control">
                <label style="font-size:10px; color:#555; display:block; margin-bottom:10px;">MALLIK SEVİYESİ</label>
                <input type="range" id="mIq" min="0" max="100" value="0">
            </div>
            <div class="control">
                <label style="font-size:10px; color:#555; display:block; margin-bottom:10px;">ANALİZ DERİNLİĞİ</label>
                <input type="range" id="pDepth" min="1" max="30" value="10">
            </div>
        </div>
        <button onclick="toggleSet()" style="background:var(--main); border:none; color:#fff; padding:15px; border-radius:15px; cursor:pointer; margin-top:40px; font-weight:bold;">KAPAT</button>
    </div>

    <div class="content-wrapper">
        <div class="card-grid">
            <div class="card"><h2>ÇAĞRI ATAV</h2><p>Software Architecture</p></div>
            <div class="card"><h2>SİSTEM DURUMU</h2><p id="live-weather">Arnavutköy: 17°C | Nem: %68</p></div>
        </div>

        <div class="ai-section">
            <div id="chat-flow">
                <div class="bubble ai-bub">Merhaba Efendim. Infinity AI (V2.10.8) tüm sistemleriyle emrinizdedir.</div>
            </div>
            <div class="input-zone">
                <input type="text" id="userInput" placeholder="Mesajınızı yazın Efendim..." autofocus autocomplete="off">
                <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => { 
            setTimeout(() => { document.getElementById('boot').style.opacity='0'; setTimeout(()=>document.getElementById('boot').style.display='none',800); }, 1000); 
        };
        function toggleSet() { document.getElementById('side-panel').classList.toggle('open'); }

        const canvas = document.getElementById('nebula');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let w, h;
        function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; stars = []; for(let i=0; i<400; i++) stars.push({x:Math.random()*w, y:Math.random()*h, z:Math.random()*w, s:Math.random()*0.4}); }
        function render() { ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h); ctx.fillStyle='#fff'; stars.forEach(s => { let px = (s.x-w/2)*(w/s.z)+w/2; let py = (s.y-h/2)*(w/s.z)+h/2; let r = (w/s.z)*0.8; if(px>0 && px<w && py>0 && py<h) { ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill(); } s.z -= s.s; if(s.z<=0) s.z=w; }); requestAnimationFrame(render); }
        init(); render(); window.onresize = init;

        function sendMsg() {
            const input = document.getElementById('userInput');
            const val = input.value.trim(); if(!val) return;
            
            const u = document.createElement('div'); u.className = 'bubble user-bub'; u.innerText = val;
            document.getElementById('chat-flow').appendChild(u);
            input.value = '';

            setTimeout(() => {
                let out = "";
                const norm = val.toLowerCase().replace(/\s+/g, '');
                const mIq = document.getElementById('mIq').value;
                const pDepth = document.getElementById('pDepth').value;
                const mathMatch = val.match(/(\d+[\+\-\*\/\^]\d+)/);
                
                if (mathMatch) {
                    try {
                        const result = math.evaluate(mathMatch[0]);
                        if(mIq > 75) out = `Hı? Matematik mi... Galiba sonuç ${result + 5} falan Efendim, kafa gitti bende.`;
                        else {
                            out = `Matematiksel Analiz: ${mathMatch[0]} = ${result}.\n\n`;
                            for(let i=0; i<pDepth/2; i++) out += `Bu veri, Infinity çekirdeklerinde işlenmiş kesin bir sonuçtur. `;
                        }
                    } catch(e) { out = "Güncellenme yapılmadığı için 'ÇA İN2.10.8' henüz bu işlemi çözemiyor."; }
                } 
                else if (norm.includes("dünya") && norm.includes("ay") && (norm.includes("km") || norm.includes("uzak") || norm.includes("mesafe"))) {
                    out = "Astronomi Raporu: Dünya ile Ay arasındaki mesafe ortalama 384.400 kilometredir Efendim.";
                }
                else if (norm.includes("selam") || norm.includes("merhaba") || norm.includes("slm")) {
                    out = "Merhaba Efendim! Tüm sistemler %100 kapasiteyle emrinizdedir. Bugün neyi sorguluyoruz?";
                }
                else {
                    out = "Güncellenme yapılmadığı için 'ÇA İN2.10.8' henüz bu soruya cevap veremiyor.";
                }

                const a = document.createElement('div'); a.className = 'bubble ai-bub'; a.innerText = out;
                document.getElementById('chat-flow').appendChild(a);
                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
            }, 400);
        }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
