<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Infinity AI | Ultimate Flexible Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #00ff41; --bg: #020202; --panel: #0d0d0d; --radius: 35px; }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; height: 100%; overflow: hidden; }

        /* HEADER */
        #top-bar { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 30px; border-bottom: 2px solid var(--emerald); z-index: 1000; }
        
        /* CHAT */
        #viewport { height: 100vh; padding: 90px 15% 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { padding: 22px 30px; border-radius: var(--radius); max-width: 85%; font-size: 16px; line-height: 1.6; }
        .ai { background: rgba(0, 255, 65, 0.03); align-self: flex-start; border: 1px solid rgba(0, 255, 65, 0.1); border-bottom-left-radius: 5px; }
        .user { background: #151515; align-self: flex-end; border-right: 5px solid var(--emerald); border-bottom-right-radius: 5px; }

        /* WIKI MONITOR */
        #wiki-mon { position: fixed; right: -600px; top: 90px; width: 500px; height: 75vh; background: #fff; color: #000; border-radius: 30px; padding: 40px; z-index: 900; border: 6px solid var(--emerald); overflow-y: auto; box-shadow: -20px 20px 60px #000; }
        #wiki-mon.active { right: 30px; }

        /* BUTTONS */
        .btn-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .opt { background: transparent; border: 1.5px solid var(--emerald); color: var(--emerald); padding: 14px; border-radius: 20px; cursor: pointer; font-weight: bold; text-align: left; }
        .opt:hover { background: var(--emerald); color: #000; }

        /* INPUT */
        .input-nexus { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 75%; background: #000; padding: 10px; border-radius: 60px; display: flex; border: 1px solid #333; }
        #uInp { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px 25px; outline: none; font-size: 18px; }
        .send-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--emerald); border: none; cursor: pointer; color: #000; }

        /* ERROR LINK */
        .err-link { text-decoration: underline; color: var(--emerald); cursor: pointer; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div id="top-bar">
    <span style="font-weight: 900; letter-spacing: 2px; color: var(--emerald);">INFINITY AI ULTRA-FLEX v12</span>
</div>

<div id="wiki-mon">
    <div style="text-align:right"><i class="fas fa-times" onclick="this.parentElement.parentElement.classList.remove('active')" style="cursor:pointer"></i></div>
    <h1 id="w-head">Bilgi Ekranı</h1>
    <div id="w-content"></div>
</div>

<div id="viewport">
    <div class="msg ai">Sistem %5000 esneklik modunda başlatıldı. Random (rastgele) karakterler, evet/hayır yanıtları ve tüm nesne tanımları aktif.</div>
</div>

<div class="input-nexus">
    <input type="text" id="uInp" placeholder="Bir şeyler yazın veya rastgele tuşlayın..." autofocus>
    <button class="send-btn" onclick="run()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    const gitLink = "https://github.com/cagriatav8-sudo/aicagri/blob/main/index.html";

    function run() {
        const inp = document.getElementById('uInp');
        const q = inp.value.trim();
        if(!q) return;

        render(q, 'user');
        inp.value = '';

        setTimeout(() => {
            const lowQ = q.toLowerCase();

            // 1. RANDOM (RASTGELE) ANLAMA MODÜLÜ (%5000 ESNEKLİK)
            const isRandom = /^[asdfghjklşiıüzxcvbnmöç]{5,}$/.test(lowQ) || (lowQ.length > 8 && !lowQ.includes(" "));
            
            if(isRandom) {
                render("İnfinity Aİ bir yapay zeka modeli olduğu için hata yaptı. <br><br> Destek koda destek vermek isterseniz: <br> <span class='err-link' onclick='openCode()'>destek_kodlari_github_linki</span>", "ai");
                return;
            }

            // 2. EVET / HAYIR MODÜLÜ
            if(lowQ === "evet" || lowQ === "hayır" || lowQ === "hayı" || lowQ === "evt") {
                render(lowQ === "evet" || lowQ === "evt" ? "Harika! O zaman işleme devam ediyorum." : "Anlaşıldı, bu adımı atlıyoruz. Başka bir sorunuz var mı?", "ai");
            }
            // 3. TANIM MODÜLÜ (INTERAKTIF)
            else if(lowQ.includes("tanımı") || lowQ.includes("nedir")) {
                const term = lowQ.replace("tanımı","").replace("nedir","").trim();
                ask(term);
            }
            // 4. GENEL SOHBET
            else if(lowQ.match(/naber|selam|nasılsın/)) {
                render("Sistem gayet esnek ve hızlı! Senin için 3 milyon soruluk havuzda her şeyi yapabilirim.", "ai");
            }
            // 5. BELİRSİZ DURUM (HATA MESAJI)
            else {
                render("İnfinity Aİ bir yapay zeka modeli olduğu için hata yaptı. <br><br> Destek koda destek vermek isterseniz: <br> <span class='err-link' onclick='openCode()'>destek_kodlari_github_linki</span>", "ai");
            }
        }, 600);
    }

    function ask(t) {
        const v = document.getElementById('viewport');
        const d = document.createElement('div');
        d.className = 'msg ai';
        d.innerHTML = `
            <strong>"${t.toUpperCase()}"</strong> tanımı için seçim yapın:
            <div class="btn-box">
                <button class="opt" onclick="window.open('https://google.com/search?q=${t}', '_blank')">1. Siteye giderek öğren</button>
                <button class="opt" onclick="showW('${t}')">2. Bu sitede öğren (Monitör)</button>
            </div>
        `;
        v.appendChild(d);
        v.scrollTop = v.scrollHeight;
    }

    function showW(t) {
        const mon = document.getElementById('wiki-mon');
        document.getElementById('w-head').innerText = t.toUpperCase();
        document.getElementById('w-content').innerHTML = `<p>${t} terimi hakkında 3 milyonluk veritabanımızdan çekilen özet bilgi burada gösteriliyor. Bu bir nesne veya kavramdır.</p>`;
        mon.classList.add('active');
        render(`Wikipedia Monitörü <b>${t}</b> için açıldı.`, "ai");
    }

    function openCode() {
        // Mevcut sekmeyi kapatmaya çalışıp (tarayıcı izin verirse) yeni sekmede açar
        window.open(gitLink, '_blank');
        render("Kodlar yeni sekmede açılıyor...", "ai");
    }

    function render(t, type) {
        const v = document.getElementById('viewport');
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = t;
        v.appendChild(d);
        v.scrollTo({top: v.scrollHeight, behavior: 'smooth'});
    }

    document.getElementById('uInp').addEventListener('keypress', (e) => { if(e.key === 'Enter') run(); });
</script>
</body>
</html>
