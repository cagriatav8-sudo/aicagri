<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Infinity AI | Çağrı ATAV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --emerald: #00ff41; --bg: #010101; --panel: #0d0d0d; --radius: 35px; }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; height: 100%; overflow: hidden; }

        /* --- HEADER --- */
        #header { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.95); display: flex; align-items: center; padding: 0 30px; border-bottom: 2px solid var(--emerald); z-index: 1000; }
        .menu-btn { color: var(--emerald); font-size: 26px; cursor: pointer; margin-right: 20px; }

        /* --- SIDEBAR --- */
        #sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background: var(--panel); z-index: 1001; padding: 100px 30px; border-right: 2px solid var(--emerald); box-shadow: 10px 0 30px #000; }
        #sidebar.active { left: 0; }
        
        /* --- CHAT AREA --- */
        #viewport { height: 100vh; padding: 100px 12% 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .bubble { padding: 22px 30px; border-radius: var(--radius); max-width: 85%; font-size: 16px; }
        .ai { background: rgba(0, 255, 65, 0.03); align-self: flex-start; border: 1px solid rgba(0, 255, 65, 0.1); border-bottom-left-radius: 5px; }
        .user { background: #111; align-self: flex-end; border-right: 5px solid var(--emerald); border-bottom-right-radius: 5px; }

        /* --- SURVEY BUTTONS --- */
        .survey-box { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
        .survey-btn { background: #000; border: 1.5px solid var(--emerald); color: var(--emerald); padding: 15px; border-radius: 20px; cursor: pointer; font-weight: 900; }
        .survey-btn:hover { background: var(--emerald); color: #000; }

        /* --- INPUT --- */
        .nexus { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 75%; background: #000; padding: 10px; border-radius: 60px; display: flex; border: 1px solid #333; }
        #uInp { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px 25px; outline: none; font-size: 18px; }
        .send-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--emerald); border: none; cursor: pointer; color: #000; font-size: 24px; }

        /* --- OFFLINE SCREEN --- */
        #off-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .online-trigger { 
            background: var(--emerald); color: #000; padding: 18px 45px; 
            border-radius: 50px; font-weight: 900; cursor: pointer; border: none; 
            box-shadow: 0 0 30px var(--emerald); margin-top: 25px; font-size: 16px;
        }

        /* --- LINK STYLE --- */
        .github-link { text-decoration: underline; color: var(--emerald); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>
    <span style="font-weight: 900; letter-spacing: 2px; color: var(--emerald);">INFINITY AI | ÇAĞRI ATAV</span>
</div>

<div id="sidebar">
    <div style="background:#1a1a1a; padding:20px; border-radius:20px; margin-bottom:20px;">
        <h4 style="color:var(--emerald); margin:0;">Sistem Sahibi</h4>
        <p style="font-size:14px;">Çağrı ATAV</p>
    </div>
    <button onclick="triggerOff()" style="width:100%; background:red; color:#fff; padding:15px; border-radius:15px; border:none; cursor:pointer; font-weight:bold;">Sistemi Çevrimdışı Yap</button>
</div>

<div id="off-screen">
    <i class="fas fa-wifi-slash" style="font-size: 80px; color: #555;"></i>
    <h1 style="margin-top:20px; letter-spacing: 3px;">BAĞLANTI KESİLDİ</h1>
    <p style="color:#888;">Çağrı ATAV Mantık Çekirdeği askıya alındı.</p>
    <button class="online-trigger" onclick="goOnline()">ONLINE MODA GEÇ</button>
</div>

<div id="viewport">
    <div class="bubble ai">
        <strong>Hoş Geldin Knk!</strong> <br>
        Sistem her zamanki gibi %5000 esnek. <br>
        Üç çizgi aktif, offline moddan online'a dönüş butonu eklendi.
    </div>
</div>

<div class="nexus">
    <input type="text" id="uInp" placeholder="Tahta tanımı..." autofocus autocomplete="off">
    <button class="send-btn" onclick="run()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    const GIT = "https://github.com/cagriatav8-sudo/aicagri/blob/main/index.html";

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function triggerOff() { 
        document.getElementById('off-screen').style.display = 'flex'; 
        toggleMenu(); // Sidebar'ı kapat
    }

    // ONLINE MODA DÖNÜŞ FONKSİYONU
    function goOnline() {
        document.getElementById('off-screen').style.display = 'none';
        render("Sistem başarıyla <b>Online</b> moda geçirildi. Tüm sensörler aktif!", "ai");
    }

    function run() {
        const inp = document.getElementById('uInp');
        const q = inp.value.trim();
        if(!q) return;
        render(q, 'user');
        inp.value = '';

        setTimeout(() => {
            const low = q.toLowerCase();
            const isRandom = /^[asdfghjklşiıüzxcvbnmöç]{6,}$/.test(low) || (low.length > 10 && !low.includes(" "));

            if(isRandom) {
                showErr();
            } else if(low.includes("tanımı") || low.includes("nedir")) {
                const term = low.replace("tanımı","").replace("nedir","").trim();
                showAnket(term);
            } else {
                showErr();
            }
        }, 500);
    }

    function showAnket(t) {
        const d = document.createElement('div');
        d.className = 'bubble ai';
        d.innerHTML = `
            <strong>"${t.toUpperCase()}"</strong> Anketi Açıldı:
            <div class="survey-box">
                <button class="survey-btn" onclick="window.open('https://google.com/search?q=${t}', '_blank')">1. Siteye Git (Yeni Sekme)</button>
                <button class="survey-btn" onclick="render('Wikipedia monitörü simüle ediliyor... Bu bir ${t} nesnesidir.', 'ai')">2. Bu Sitede Öğren</button>
            </div>
        `;
        document.getElementById('viewport').appendChild(d);
        document.getElementById('viewport').scrollTop = document.getElementById('viewport').scrollHeight;
    }

    function showErr() {
        render(`İnfinity Aİ bir yapay zeka modeli olduğu için hata yaptı.<br><br>Destek koda destek vermek isterseniz:<br><span class="github-link" onclick="window.open('${GIT}', '_blank')">destek_kodlari_github_linki</span>`, "ai");
    }

    function render(text, type) {
        const v = document.getElementById('viewport');
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        d.innerHTML = text;
        v.appendChild(d);
        v.scrollTo({top: v.scrollHeight, behavior: 'smooth'});
    }

    document.getElementById('uInp').addEventListener('keypress', (e) => { if(e.key === 'Enter') run(); });
</script>
</body>
</html>
